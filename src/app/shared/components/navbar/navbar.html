<nav class="navbar">
    <div class="navbar-brand">
        <a routerLink="/metas" class="navbar-logo">
            <i class="material-icons logo-icon">stars</i>
            <span class="logo-text">Eficiência em Ação</span>
        </a>
    </div>

    <div class="navbar-links">
        <a routerLink="/metas" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <i class="material-icons link-icon">poll</i> Requisitos
        </a>
    </div>

    <div class="navbar-actions">
        @if (auth.isLoggedIn()) {
        @if (auth.isCoordenador()) {
        <button class="btn btn-profile-action" (click)="openDelegacoesModal()">Meus Assessores / Delegações</button>
        }
        <span class="user-info">
            <i class="material-icons user-avatar">account_circle</i>
            <span class="user-name">{{ auth.getName() }}</span>
            @if (auth.isDigov()) {
            <span class="role-badge role-badge--digov">DIGOV</span>
            } @else if (auth.isCoordenador()) {
            <span class="role-badge role-badge--coordenador">Coordenador</span>
            }
        </span>
        <button class="btn btn-logout" (click)="logout()">Sair</button>
        } @else {
        <button class="btn btn-login" (click)="login()">Entrar</button>
        }
    </div>
</nav>

<app-gerenciar-delegacoes-modal [display]="displayDelegacoesModal" (displayChange)="displayDelegacoesModal = $event"></app-gerenciar-delegacoes-modal>

<div class="p-4">
  <p-toast></p-toast>
  
  <p-card header="Importação em Lote de Requisitos" subheader="Siga as etapas para importar seus dados">
    
    <!-- ETAPA 1: UPLOAD -->
    @if (etapa === 'upload') {
      <div class="flex flex-column align-items-center justify-content-center py-6">
        <i class="pi pi-file-excel text-6xl text-primary mb-4" style="font-size: 4rem"></i>
        <h3 class="mb-4">Selecione o arquivo Excel ou CSV</h3>
        
        <p-fileUpload 
          mode="basic" 
          chooseLabel="Escolher Arquivo" 
          accept=".xlsx,.xls,.csv" 
          [maxFileSize]="1000000" 
          (onSelect)="onUpload($event)"
          styleClass="p-button-lg">
        </p-fileUpload>
        
        <p class="mt-4 text-color-secondary">Formatos aceitos: .xlsx, .xls e .csv</p>
      </div>
    }

    <!-- ETAPA 2: MAPEAMENTO -->
    @if (etapa === 'mapeamento') {
      <div class="flex flex-column gap-4">
        <div class="flex justify-content-between align-items-center">
          <div class="flex flex-column gap-1">
            <h4 class="text-xl font-medium m-0">Mapeamento de Colunas</h4>
            <div class="flex align-items-center gap-2">
              <p class="text-sm text-color-secondary m-0">Defina o ano do ciclo e as colunas correspondentes</p>
              <p-tag [value]="dadosPlanilhaFull.length + ' registros encontrados'" severity="info" styleClass="text-xs"></p-tag>
            </div>
          </div>
          <div class="flex gap-2">
            <p-button 
                label="Voltar" 
                icon="pi pi-arrow-left" 
                [outlined]="true" 
                severity="secondary" 
                [disabled]="loading"
                (onClick)="voltar()">
            </p-button>
            <p-button 
                label="Confirmar Importação" 
                icon="pi pi-check" 
                [loading]="loading"
                (onClick)="confirmarImportacao()">
            </p-button>
          </div>
        </div>

        <div class="flex align-items-center gap-3 p-3 surface-ground border-round">
          <label for="anoCiclo" class="font-bold">Ano do Ciclo para todos os requisitos:</label>
          <input 
            pInputText 
            id="anoCiclo" 
            type="number" 
            [(ngModel)]="anoCicloGlobal" 
            [disabled]="loading"
            class="w-8rem" 
            placeholder="Ex: 2025" />
        </div>

        <p-table [value]="dadosMapeamento" [responsiveLayout]="'scroll'" styleClass="p-datatable-striped">
          <ng-template pTemplate="header">
            <tr>
              <th style="width: 50%">Campo no Sistema</th>
              <th style="width: 50%">Coluna da Planilha</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-item>
            <tr>
              <td>
                <span class="font-bold text-primary">{{ item.label }}</span>
                <small class="block text-color-secondary">{{ item.campo }}</small>
              </td>
              <td>
                <p-select 
                  [options]="colunasPlanilha" 
                  [(ngModel)]="item.colunaPlanilha" 
                  placeholder="Selecione a coluna da planilha"
                  [showClear]="true"
                  [filter]="true"
                  filterPlaceholder="Pesquisar coluna..."
                  appendTo="body"
                  styleClass="w-full">
                </p-select>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    }

  </p-card>
</div>
